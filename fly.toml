# fly.toml app configuration file generated for f1-driver-stats on 2026-05-27T09:09:23-04:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'f1-driver-stats'
primary_region = 'ewr'

[build]

[http_service]
  internal_port = 8501
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[services]]
  protocol = 'tcp'
  internal_port = 8501

  [[services.ports]]
    port = 80
    handlers = ['http']

  [[services.ports]]
    port = 443
    handlers = ['tls', 'http']

  [services.concurrency]
    type = 'connections'
    hard_limit = 10
    soft_limit = 5

  [[services.http_checks]]
    interval = '15s'
    timeout = '5s'
    path = '/_stcore/health'

[[vm]]
  memory = '1gb'
  cpus = 1
  memory_mb = 1024
